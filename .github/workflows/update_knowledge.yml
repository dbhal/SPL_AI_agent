name: SPL Knowledge Base Update

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this update?'
        required: false
        default: 'Manual knowledge base refresh'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests beautifulsoup4 sentence-transformers groq numpy chromadb slowapi
      env:
        PYTHONUTF8: "1"

    - name: Scrape SPL website (full rebuild)
      run: |
        echo "Scraping full SPL website..."
        python scripts/scrape_spl_semantic.py
        python -c "import json; d=json.load(open('data/spl_chunks.json',encoding='utf-8')); print(f'Scraped chunks: {len(d)}')"
      env:
        PYTHONUTF8: "1"

    - name: Regenerate full QA dataset
      run: |
        echo "Regenerating all Q&A pairs..."
        python scripts/regenerate_qa.py
        python -c "import json; d=json.load(open('data/auto_qa_dataset.json',encoding='utf-8')); print(f'QA pairs: {len(d)}')"
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        PYTHONUTF8: "1"

    - name: Convert QA to chunks
      run: |
        echo "Converting QA to chunk format..."
        python scripts/qa_to_chunks.py
        python -c "import json; d=json.load(open('data/manual_chunks.json',encoding='utf-8')); print(f'Manual chunks: {len(d)}')"
      env:
        PYTHONUTF8: "1"

    - name: Deduplicate chunks
      run: |
        echo "Checking and removing duplicates..."
        python scripts/dedupe_check.py --fix
        python scripts/dedupe_check.py
      env:
        PYTHONUTF8: "1"

    - name: Sync data to backend
      run: |
        mkdir -p backend/data
        cp data/spl_chunks.json backend/data/spl_chunks.json
        cp data/manual_chunks.json backend/data/manual_chunks.json
        cp data/auto_qa_dataset.json backend/data/auto_qa_dataset.json
        echo "Sync complete"

    - name: Run evaluation suite
      run: python scripts/run_eval.py
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        PYTHONUTF8: "1"
        CHROMA_DIR: "/tmp/chroma_db"

    - name: Commit updated data
      run: |
        git config user.name "HokieBot Automation"
        git config user.email "hokiebot@spl.vt.edu"
        git add data/ backend/data/
        git diff --staged --quiet && echo "No changes" || git commit -m "Knowledge base update $(date '+%Y-%m-%d') - ${{ github.event.inputs.reason }}"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Restart Hugging Face Space
      run: |
        curl -X POST "https://huggingface.co/api/spaces/dbehal/spl-chatbot/restart" \
          -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
          -H "Content-Type: application/json"
        echo "HF Spaces restart triggered"
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}

    - name: Summary
      run: |
        echo "================================================"
        echo "Update complete — triggered by ${{ github.actor }}"
        echo "Reason: ${{ github.event.inputs.reason }}"
        echo "Test at: https://dbehal-spl-chatbot.hf.space"
        echo "================================================"
